
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mat kar lala</title>

<style>

body{
  background:#f8fafc;
  font-family:'Segoe UI', sans-serif;
  margin:0;
  padding:40px 0;
  display:flex;
  justify-content:center;
}

.button-container{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
}

.glow-btn{
  width:70px;
  height:70px;
  border:none;
  border-radius:15px;
  background:rgba(229, 233, 240, 0.2);
  color:#77acdd;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 10px rgba(34,197,94,0.3);
  transition:0.25s;
}

.glow-btn:hover{
  background:rgba(131, 175, 193, 0.4);
  box-shadow:0 0 20px rgba(121, 195, 204, 0.6);
  transform:translateY(-3px);
}

.glow-btn:active{
  transform:scale(0.96);
}

#toast{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#80bccf;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  display:none;
  font-size:14px;
}

</style>
</head>

<body>

<div class="button-container">

<button class="glow-btn" data-file="Prac2.txt">2</button>
<button class="glow-btn" data-file="Prac3.txt">3</button>
<button class="glow-btn" data-file="Prac4.txt">4</button>
<button class="glow-btn" data-file="Prac5.txt">5</button>
<button class="glow-btn" data-file="Prac6.txt">6</button>
<button class="glow-btn" data-file="Prac7.txt">7</button>
<button class="glow-btn" data-file="Prac8.txt">8</button>
<button class="glow-btn" data-file="Prac9.txt">9</button>


</div>

<div id="toast">Copied!</div>

<script>

const buttons = document.querySelectorAll(".glow-btn");
const toast = document.getElementById("toast");

buttons.forEach(button => {

  button.addEventListener("click", async () => {

    const file = button.dataset.file;

    try{

      const response = await fetch(file);

      if(!response.ok){
        throw new Error("File not found");
      }

      const text = await response.text();

      await navigator.clipboard.writeText(text);

      showToast("Copied 👍");

    }catch(error){

      console.error(error);
      showToast("Error");

    }

  });

});

function showToast(message){

  toast.innerText = message;
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },1200);

}

</script>

</body>
</html>
